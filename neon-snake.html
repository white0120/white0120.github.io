<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            width: 600px;
            margin-bottom: 10px;
            color: #fff;
            font-size: 18px;
        }

        .score {
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        .high-score {
            color: #ffaa00;
            text-shadow: 0 0 10px #ffaa00;
        }

        .speed-indicator {
            color: #ff55ff;
            text-shadow: 0 0 10px #ff55ff;
        }

        canvas {
            border: 2px solid #333;
            border-radius: 8px;
            box-shadow:
                0 0 20px rgba(0, 255, 136, 0.3),
                inset 0 0 20px rgba(0, 255, 136, 0.05);
        }

        .controls {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
            text-align: center;
            line-height: 1.8;
        }

        .controls span {
            color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            margin: 0 2px;
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            z-index: 10;
        }

        .overlay h1 {
            font-size: 48px;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .overlay p {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #000;
            border: none;
            padding: 15px 50px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
        }

        .hidden {
            display: none !important;
        }

        .game-over-title {
            font-size: 42px;
            color: #ff5555;
            text-shadow: 0 0 20px #ff5555;
            margin-bottom: 15px;
        }

        .final-score {
            font-size: 24px;
            color: #fff;
            margin-bottom: 10px;
        }

        .new-record {
            font-size: 20px;
            color: #ffaa00;
            text-shadow: 0 0 10px #ffaa00;
            margin-bottom: 25px;
            animation: pulse 0.8s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-info">
            <div class="score">得分: <span id="score">0</span></div>
            <div class="high-score">最高分: <span id="highScore">0</span></div>
            <div class="speed-indicator">速度: <span id="speed">1x</span></div>
        </div>
        <canvas id="game" width="600" height="600"></canvas>

        <div class="overlay" id="startScreen">
            <h1>霓虹贪吃蛇</h1>
            <p>吃掉发光的果实，不要让蛇撞到墙壁或自己！</p>
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>

        <div class="overlay hidden" id="gameOverScreen">
            <div class="game-over-title">游戏结束</div>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <div class="new-record hidden" id="newRecord">新纪录！</div>
            <button class="btn" onclick="startGame()">再来一局</button>
        </div>

        <div class="controls">
            使用 <span>方向键</span> 或 <span>WASD</span> 控制移动 &nbsp;|&nbsp;
            按住 <span>空格键</span> 加速 &nbsp;|&nbsp;
            按 <span>P</span> 暂停
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;

        let snake = [];
        let food = {};
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 150;
        let baseSpeed = 150;
        let isAccelerating = false;
        let isPaused = false;
        let isGameOver = false;
        let particles = [];
        let foodGlow = 0;

        const COLORS = {
            snakeHead: '#00ff88',
            snakeBody: ['#00dd77', '#00bb66', '#009955', '#007744'],
            food: '#ff5555',
            foodGlow: 'rgba(255, 85, 85, 0.3)',
            grid: '#1a1a1a'
        };

        document.getElementById('highScore').textContent = highScore;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = baseSpeed;
            isAccelerating = false;
            isPaused = false;
            isGameOver = false;
            particles = [];
            spawnFood();
            updateScore();
            updateSpeedDisplay();
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function updateSpeedDisplay() {
            const multiplier = (baseSpeed / gameSpeed).toFixed(1);
            document.getElementById('speed').textContent = multiplier + 'x';
        }

        function createParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count;
                particles.push({
                    x: x * CELL_SIZE + CELL_SIZE / 2,
                    y: y * CELL_SIZE + CELL_SIZE / 2,
                    vx: Math.cos(angle) * (2 + Math.random() * 3),
                    vy: Math.sin(angle) * (2 + Math.random() * 3),
                    life: 1,
                    decay: 0.02 + Math.random() * 0.02,
                    color: color,
                    size: 3 + Math.random() * 4
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.98;
                p.vy *= 0.98;
                p.life -= p.decay;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        function drawGrid() {
            ctx.strokeStyle = COLORS.grid;
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((segment, index) => {
                const x = segment.x * CELL_SIZE;
                const y = segment.y * CELL_SIZE;
                const isHead = index === 0;
                const color = isHead ? COLORS.snakeHead : COLORS.snakeBody[Math.min(index - 1, COLORS.snakeBody.length - 1)];

                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = isHead ? 20 : 10;

                const padding = isHead ? 1 : 2;
                const size = CELL_SIZE - padding * 2;

                if (isHead) {
                    ctx.beginPath();
                    ctx.roundRect(x + padding, y + padding, size, size, 6);
                    ctx.fill();

                    // 眼睛
                    ctx.fillStyle = '#000';
                    ctx.shadowBlur = 0;
                    const eyeOffset = CELL_SIZE / 4;
                    const eyeSize = 3;

                    let eye1X = x + CELL_SIZE / 2, eye1Y = y + CELL_SIZE / 3;
                    let eye2X = x + CELL_SIZE / 2, eye2Y = y + CELL_SIZE * 2 / 3;

                    if (direction.x === 1) {
                        eye1X = x + CELL_SIZE * 2 / 3; eye1Y = y + CELL_SIZE / 3;
                        eye2X = x + CELL_SIZE * 2 / 3; eye2Y = y + CELL_SIZE * 2 / 3;
                    } else if (direction.x === -1) {
                        eye1X = x + CELL_SIZE / 3; eye1Y = y + CELL_SIZE / 3;
                        eye2X = x + CELL_SIZE / 3; eye2Y = y + CELL_SIZE * 2 / 3;
                    } else if (direction.y === -1) {
                        eye1X = x + CELL_SIZE / 3; eye1Y = y + CELL_SIZE / 3;
                        eye2X = x + CELL_SIZE * 2 / 3; eye2Y = y + CELL_SIZE / 3;
                    } else if (direction.y === 1) {
                        eye1X = x + CELL_SIZE / 3; eye1Y = y + CELL_SIZE * 2 / 3;
                        eye2X = x + CELL_SIZE * 2 / 3; eye2Y = y + CELL_SIZE * 2 / 3;
                    }

                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.roundRect(x + padding, y + padding, size, size, 4);
                    ctx.fill();
                }
            });
            ctx.shadowBlur = 0;
        }

        function drawFood() {
            const x = food.x * CELL_SIZE + CELL_SIZE / 2;
            const y = food.y * CELL_SIZE + CELL_SIZE / 2;

            foodGlow += 0.05;
            const glowSize = 15 + Math.sin(foodGlow) * 5;

            ctx.shadowColor = COLORS.food;
            ctx.shadowBlur = glowSize;
            ctx.fillStyle = COLORS.food;

            ctx.beginPath();
            ctx.arc(x, y, CELL_SIZE / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;

            // 星星效果
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(x - 2, y - 2, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawPaused() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 40px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.fillText('暂停', canvas.width / 2, canvas.height / 2);
            ctx.font = '20px Microsoft YaHei';
            ctx.fillStyle = '#888';
            ctx.fillText('按 P 继续', canvas.width / 2, canvas.height / 2 + 40);
        }

        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid();
            drawFood();
            drawSnake();
            drawParticles();

            if (isPaused) {
                drawPaused();
            }
        }

        function update() {
            if (isPaused || isGameOver) return;

            direction = { ...nextDirection };

            const head = { ...snake[0] };
            head.x += direction.x;
            head.y += direction.y;

            // 撞墙检测
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver();
                return;
            }

            // 撞自己检测
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScore();
                createParticles(food.x, food.y, COLORS.food, 12);
                spawnFood();

                // 逐渐加速
                if (gameSpeed > 60) {
                    gameSpeed -= 3;
                    updateSpeedDisplay();
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, gameSpeed);
                }
            } else {
                snake.pop();
            }

            updateParticles();
            draw();
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            createParticles(snake[0].x, snake[0].y, '#ff5555', 20);
            draw();

            const isNewRecord = score > highScore;
            if (isNewRecord) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            setTimeout(() => {
                document.getElementById('finalScore').textContent = score;
                document.getElementById('newRecord').classList.toggle('hidden', !isNewRecord);
                document.getElementById('gameOverScreen').classList.remove('hidden');
            }, 800);
        }

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            initGame();
            clearInterval(gameLoop);
            gameLoop = setInterval(update, gameSpeed);
            draw();
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (isGameOver) return;

            // 暂停
            if (e.key === 'p' || e.key === 'P') {
                if (!document.getElementById('startScreen').classList.contains('hidden')) return;
                if (!document.getElementById('gameOverScreen').classList.contains('hidden')) return;
                isPaused = !isPaused;
                draw();
                return;
            }

            if (isPaused) return;

            // 加速
            if (e.key === ' ') {
                e.preventDefault();
                if (!isAccelerating && !document.getElementById('startScreen').classList.contains('hidden')) return;
                isAccelerating = true;
                clearInterval(gameLoop);
                gameLoop = setInterval(update, gameSpeed / 2);
                return;
            }

            // 方向控制
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === ' ' && isAccelerating) {
                isAccelerating = false;
                clearInterval(gameLoop);
                gameLoop = setInterval(update, gameSpeed);
            }
        });

        // 触摸/滑动支持（移动端）
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (isPaused || isGameOver) return;

            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            if (Math.max(absDx, absDy) < 20) return;

            if (absDx > absDy) {
                if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
            } else {
                if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
            }
        }, { passive: false });

        // 初始绘制
        drawGrid();
    </script>
</body>
</html>
